name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    name: Validate schema and fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
